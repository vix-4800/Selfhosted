---
services:
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-cuda
    container_name: immich_machine_learning
    extends:
      file: hwaccel.ml.yml
      service: cuda
    command:
      - /opt/venv/bin/python
      - -m
      - uvicorn
      - immich_ml.main:app
      - --host
      - 0.0.0.0
      - --port
      - '3003'
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/venv/bin/python /usr/src/healthcheck.py
    volumes:
      - model-cache:/cache
    restart: unless-stopped
    ports:
      - 3003:3003
    env_file:
      - ../.env

volumes:
  model-cache:
