---
name: self-hosted

services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    ports:
      - 8282:80/tcp
    env_file:
      - ../.env
    volumes:
      - wallos_db:/var/www/html/db
      - wallos_logos:/var/www/html/images/uploads/logos
    restart: unless-stopped

volumes:
  wallos_db:
    name: wallos_db
    driver: local
  wallos_logos:
    name: wallos_logos
    driver: local
